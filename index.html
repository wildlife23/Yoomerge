<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#182e18">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <title>생태계 수호자</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;}
:root{--bg:#0e1c0e;--panel:#182e18;--border:#2e4a2e;--text:#d0eed0;--dim:#80b880;--accent:#50c850;}
html{height:100%;height:-webkit-fill-available;}
body{height:100%;height:100vh;width:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;display:flex;flex-direction:column;}


/* ── TOP BAR ────────────────────────────── */
#top-bar{display:flex;align-items:center;padding:0 8px;background:var(--panel);border-bottom:1px solid var(--border);height:40px;flex-shrink:0;gap:8px;}
#chapter-label{font-weight:700;color:var(--accent);font-size:12px;white-space:nowrap;}
#level-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;}
#level-text{font-size:11px;font-weight:700;color:#f0c040;}
#xp-bar-bg{width:100%;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
#xp-bar{height:100%;background:#f0c040;width:0%;transition:width 0.3s;border-radius:2px;}
#dex-btn{background:var(--border);border:none;color:var(--text);padding:4px 7px;border-radius:6px;font-size:11px;cursor:pointer;white-space:nowrap;}

/* ── STATUS BAR ─────────────────────────── */
#status-bar{display:flex;align-items:center;padding:0 6px;background:var(--panel);border-bottom:1px solid var(--border);height:32px;flex-shrink:0;gap:5px;}
#energy-wrap{display:flex;align-items:center;gap:2px;cursor:pointer;padding:2px 5px;border-radius:5px;background:#1e3020;white-space:nowrap;}
#energy-wrap .ico{font-size:13px;}
#energy-text{font-size:10px;color:#90ee90;}
#score-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;}
#score-text{font-size:10px;font-weight:700;color:var(--accent);}
#score-bar-bg{width:100%;height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
#score-bar{height:100%;background:var(--accent);width:0%;transition:width 0.4s;border-radius:2px;}
#score-goal-text{font-size:8px;color:var(--dim);}
#diamond-wrap{display:flex;align-items:center;gap:2px;cursor:pointer;padding:2px 5px;border-radius:5px;background:#1e1e32;white-space:nowrap;}
#diamond-wrap .ico{font-size:13px;}
#diamond-text{font-size:10px;color:#a0a0ff;}
#shop-btn{background:none;border:1px solid var(--border);color:var(--dim);padding:1px 6px;border-radius:4px;font-size:9px;cursor:pointer;white-space:nowrap;font-family:inherit;}

/* ── QUEST PANEL ────────────────────────── */
#quest-panel{display:flex;align-items:center;padding:4px 6px;gap:5px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;height:70px;overflow-x:auto;overflow-y:hidden;scrollbar-width:none;}
#quest-panel::-webkit-scrollbar{display:none;}
#quest-empty{font-size:11px;color:var(--dim);flex:1;text-align:center;}
.qcard{min-width:108px;height:62px;background:#182818;border:1px solid var(--border);border-radius:8px;padding:4px 5px;display:flex;flex-direction:column;gap:1px;flex-shrink:0;transition:background 0.2s,border-color 0.2s;}
.qcard.qdone{opacity:0.4;border-color:#1e2e1e;}
.qcard.qready{background:#1a3a1a;border-color:var(--accent);box-shadow:0 0 6px rgba(80,200,80,0.3);}
.qh{display:flex;align-items:center;gap:3px;}
.qnpc{font-size:15px;line-height:1;}
.qname{font-size:8px;color:var(--dim);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:68px;}
.qreq{font-size:10px;color:var(--text);white-space:nowrap;}
.qrew{font-size:8px;color:var(--dim);}
.qbtn{font-size:9px;padding:1px 0;border-radius:3px;border:none;background:var(--border);color:var(--dim);cursor:pointer;font-family:inherit;width:100%;height:15px;line-height:1;}
.qbtn.ready{background:var(--accent);color:#fff;font-weight:700;}

/* ── BOARD ──────────────────────────────── */
#board-container{flex:1;overflow:hidden;padding:4px;display:flex;align-items:center;justify-content:center;min-height:0;}
#board{display:grid;grid-template-columns:repeat(6,1fr);gap:3px;width:min(100%,calc((100vh - 222px) * 0.75));max-width:420px;}

/* ── INVENTORY ──────────────────────────── */
#inv-panel{display:flex;align-items:center;padding:4px 6px;background:var(--panel);border-top:1px solid var(--border);flex-shrink:0;height:64px;gap:5px;}
#inv-label{font-size:8px;color:var(--dim);writing-mode:vertical-rl;text-orientation:mixed;flex-shrink:0;line-height:1;text-align:center;}
#inv-slots{display:flex;gap:3px;overflow-x:auto;flex:1;align-items:center;scrollbar-width:none;padding:2px 0;}
#inv-slots::-webkit-scrollbar{display:none;}
.inv-cell{width:50px;height:50px;border-radius:8px;border:1.5px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;position:relative;touch-action:none;}
.inv-cell-empty{background:#172717;border-style:dashed;border-color:#2a4030;}
.inv-cell-filled{cursor:pointer;}
.inv-cell-filled:active{filter:brightness(1.3);}
.inv-item-emoji{font-size:clamp(16px,5vw,26px);line-height:1;pointer-events:none;}
/* 길게 누르기 시각 피드백 */
.cell-holding{box-shadow:0 0 0 3px rgba(255,80,80,0.7)!important;transition:box-shadow 0.1s!important;}

/* ── CELLS ──────────────────────────────── */
.cell{aspect-ratio:1;border-radius:10px;border:2px solid transparent;display:flex;align-items:center;justify-content:center;position:relative;overflow:visible;transition:transform 0.1s,box-shadow 0.15s;touch-action:none;}
/* 빈 칸: 반투명 어두운 박스로 위치 표시 */
.cell-empty{background:rgba(0,0,0,0.28);border-color:rgba(255,255,255,0.07);border-radius:10px;}
/* 채워진 칸: 배경 없음 - 아이템만 표시 */
.cell-filled{background:transparent!important;border-color:transparent!important;}
.cell-dragging{opacity:0.3;}
/* 생산소/서식지: 약한 점선 테두리만 */
.cell-gen{cursor:pointer;background:rgba(0,0,0,0.22)!important;border:1.5px dashed rgba(255,255,255,0.22)!important;border-radius:10px!important;}
.cell-gen::after{content:'▶';position:absolute;bottom:2px;right:3px;font-size:8px;opacity:0.7;color:#fff;text-shadow:0 0 3px rgba(0,0,0,0.8);}
.cell-gen:active{filter:brightness(1.4);}
.cell-special{cursor:pointer;background:rgba(0,0,0,0.22)!important;border:1.5px dotted rgba(255,255,255,0.22)!important;border-radius:10px!important;}
.cell-special:active{filter:brightness(1.4);}
.cell-rare{animation:rareGlow 2s ease-in-out infinite alternate;}
@keyframes rareGlow{from{filter:drop-shadow(0 0 6px gold);}to{filter:drop-shadow(0 0 14px gold);}}

/* 아이템: 셀 가득 채우기 */
.item-emoji{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:clamp(24px,10vw,46px);line-height:1;pointer-events:none;}
.item-emoji img{width:88%;height:88%;object-fit:contain;pointer-events:none;display:block;}
.inv-item-emoji{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:clamp(16px,5vw,26px);}
.inv-item-emoji img{width:82%;height:82%;object-fit:contain;pointer-events:none;display:block;}
.cel-emoji img{width:68px;height:68px;object-fit:contain;display:block;margin:0 auto 10px;animation:pop 0.4s ease;}
.gen-select-btn .ge img{width:26px;height:26px;object-fit:contain;display:block;margin:0 auto;}
/* 보드 배경 */
#board-container{background-image:url('image/기본 게임 보드 배경_1.png');background-size:cover;background-position:center;}
/* 보드 그리드 영역에 반투명 어두운 오버레이 (아이템-배경 구분) */
#board{background:rgba(0,0,0,0.18);border-radius:12px;padding:4px;}
/* 상태바 아이콘 */
#energy-wrap img.stat-ico{width:18px;height:18px;object-fit:contain;vertical-align:middle;}
#diamond-wrap img.stat-ico{width:16px;height:16px;object-fit:contain;vertical-align:middle;}
/* 인벤토리 잠금 칸 */
.inv-cell-locked{background:rgba(0,0,0,0.45);border:1.5px solid rgba(255,200,0,0.3);cursor:pointer;}
.inv-cell-locked:active{filter:brightness(1.3);}
.inv-lock-ico{font-size:14px;display:block;line-height:1;}
.inv-lock-cost{font-size:8px;color:#f0c040;display:block;line-height:1.3;}

/* 레벨 뱃지: 우하단 작은 숫자 */
.lv-badge{
  position:absolute;bottom:2px;right:3px;
  font-size:clamp(9px,2.4vw,13px);font-weight:800;
  background:rgba(0,0,0,0.55);border-radius:4px;
  padding:0 3px;line-height:1.5;
  pointer-events:none;border:1px solid currentColor;
  min-width:14px;text-align:center;
}
/* 생산소/서식지 라벨: 하단 중앙 */
.gen-lbl{
  position:absolute;bottom:2px;left:50%;transform:translateX(-50%);
  font-size:clamp(7px,1.8vw,9px);font-weight:700;
  background:rgba(0,0,0,0.55);border-radius:3px;
  padding:0 4px;line-height:1.5;pointer-events:none;
  white-space:nowrap;
}
/* 퀘스트 일치 아이템 ✅ 표시 */
.cell-quest-match::before{
  content:'✅';position:absolute;top:2px;left:2px;
  font-size:clamp(10px,2.8vw,15px);z-index:2;line-height:1;
  filter:drop-shadow(0 0 2px rgba(0,0,0,0.8));
}

/* ── GHOST ──────────────────────────────── */
#drag-ghost{position:fixed;pointer-events:none;z-index:999;opacity:0.88;transform:scale(1.15);border-radius:10px;display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,0.3);}
#drag-ghost.hidden{display:none;}

/* ── MODAL ──────────────────────────────── */
#modal{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;}
#modal.hidden{display:none;}
#modal-content{background:#182e18;border:1px solid var(--border);border-radius:18px;padding:20px 16px;max-width:360px;width:100%;max-height:82vh;overflow-y:auto;}
#modal-content h2{color:var(--accent);font-size:18px;margin-bottom:8px;}
#modal-content h3{color:var(--accent);font-size:15px;margin-bottom:8px;}
#modal-content p{color:var(--dim);font-size:13px;line-height:1.6;margin-bottom:8px;}
.mbtn{display:block;width:100%;background:var(--accent);border:none;border-radius:10px;color:#fff;padding:10px;font-size:14px;cursor:pointer;margin-top:8px;font-family:inherit;font-weight:600;}
.mbtn.cancel{background:#3a4a3a;}
.mbtn.diamond{background:#4040a0;}

/* Shop */
.shop-header{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:#1e3020;border-radius:8px;margin-bottom:12px;}
.shop-stat{display:flex;align-items:center;gap:4px;font-size:13px;}
.shop-section{margin-bottom:14px;}
.shop-section-title{font-size:11px;font-weight:700;color:var(--dim);letter-spacing:1px;padding:4px 0;border-bottom:1px solid var(--border);margin-bottom:6px;}
.shop-item{display:flex;align-items:center;padding:8px 10px;background:#1a2e1a;border-radius:8px;margin:4px 0;gap:10px;border:1px solid transparent;}
.shop-item-ico{font-size:24px;flex-shrink:0;}
.shop-item-info{flex:1;}
.shop-item-name{font-size:12px;font-weight:600;color:var(--text);}
.shop-item-desc{font-size:10px;color:var(--dim);}
.shop-item-price{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0;}
.shop-item-cost{font-size:12px;font-weight:700;color:#a0a0ff;}
.shop-item-btn{font-size:9px;padding:2px 8px;border-radius:4px;border:none;background:#4040a0;color:#fff;cursor:pointer;font-family:inherit;white-space:nowrap;}
.shop-item-btn:disabled{background:var(--border);color:var(--dim);cursor:default;}
.shop-daily-badge{font-size:9px;padding:1px 5px;border-radius:3px;background:#6a3000;color:#ffb060;margin-left:4px;}

/* DEX / other */
.gen-select-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0;}
.gen-select-btn{background:#1e381e;border:1.5px solid var(--border);border-radius:10px;padding:10px 6px;text-align:center;cursor:pointer;font-family:inherit;}
.gen-select-btn:active{border-color:var(--accent);}
.gen-select-btn .ge{font-size:26px;display:block;}
.gen-select-btn .gn{font-size:12px;font-weight:700;display:block;margin:4px 0 2px;}
.gen-select-btn .gs{font-size:10px;color:var(--dim);display:block;}
.celebration{text-align:center;}
.cel-emoji{font-size:68px;display:block;margin-bottom:10px;animation:pop 0.4s ease;}
@keyframes pop{0%,100%{transform:scale(1);}50%{transform:scale(1.3);}}
.cell-pop{animation:pop 0.28s ease!important;}
.cel-count{color:var(--accent)!important;font-weight:700!important;}
.unlock-box{background:#243824;border-radius:8px;padding:8px 10px;margin-bottom:10px;font-size:12px;color:#c8f0c8;}
.dex-items{margin:10px 0;max-height:50vh;overflow-y:auto;}
.dex-group{margin-bottom:12px;}
.dex-group-title{font-size:12px;font-weight:700;padding-bottom:4px;border-bottom:1px solid var(--border);margin-bottom:4px;}
.dex-entry{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:13px;}
.dex-date{font-size:10px;color:var(--dim);}
.dex-total{text-align:center;color:var(--accent);font-weight:700;margin-top:8px;}
.lvlbonus{background:#2a2000;border:1px solid #a08020;border-radius:8px;padding:10px;margin:8px 0;font-size:13px;color:#f0d060;text-align:center;}

/* Dev btn */
#dev-btn{position:fixed;bottom:10px;right:10px;background:none;border:none;font-size:13px;opacity:0.12;cursor:pointer;z-index:50;color:var(--dim);padding:4px;}
#dev-btn:active{opacity:0.6;}

#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:rgba(8,18,8,0.94);color:#d0eed0;padding:7px 18px;border-radius:20px;font-size:13px;opacity:0;transition:opacity 0.25s;pointer-events:none;z-index:200;white-space:nowrap;border:1px solid var(--border);}
#toast.show{opacity:1;}
.rare-status{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;margin:4px 0;}
.story-text{font-size:12px;color:#c8e6c8;line-height:1.7;margin:8px 0;text-align:left;padding:0 4px;}
.threat-text{font-size:10px;color:#ffb060;margin:4px 0;}
.charge-dots{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);font-size:9px;letter-spacing:0px;color:rgba(255,255,255,0.85);pointer-events:none;text-shadow:0 0 3px rgba(0,0,0,0.8);}
.daily-mission-row{display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid var(--border);}
.daily-mission-label{flex:1;font-size:12px;color:var(--text);}
.daily-progress-bar-bg{width:60px;height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.daily-progress-bar{height:100%;background:var(--accent);border-radius:3px;transition:width 0.3s;}
.daily-claim-btn{font-size:10px;padding:2px 8px;border-radius:4px;border:none;background:#4040a0;color:#fff;cursor:pointer;font-family:inherit;}
.daily-claim-btn:disabled{background:var(--border);color:var(--dim);cursor:default;}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="top-bar">
  <span id="chapter-label">챕터 1</span>
  <div id="level-wrap">
    <span id="level-text">Lv.1</span>
    <div id="xp-bar-bg"><div id="xp-bar"></div></div>
  </div>
  <button id="daily-btn" onclick="showDailyModal()">📅</button>
  <button id="dex-btn" onclick="showDex()">📋 도감</button>
  <button id="sound-btn" onclick="toggleMute()">🔊</button>
</div>

<!-- STATUS BAR -->
<div id="status-bar">
  <div id="energy-wrap" onclick="showEnergyModal()">
    <img src="image/에너지_1.png" class="stat-ico" alt="⚡"><span id="energy-text">100/100</span>
  </div>
  <div id="score-wrap">
    <span id="score-text">0점</span>
    <div id="score-bar-bg"><div id="score-bar"></div></div>
    <span id="score-goal-text">목표 300점</span>
  </div>
  <div id="diamond-wrap" onclick="showShop()">
    <img src="image/다이아몬드_1.png" class="stat-ico" alt="💎"><span id="diamond-text">5</span>
  </div>
  <button id="shop-btn" onclick="showShop()">🛒 상점</button>
</div>

<!-- QUEST PANEL -->
<div id="quest-panel">
  <div id="quest-empty">🌱 서식지를 만들면 퀘스트가 시작됩니다!</div>
</div>

<!-- BOARD -->
<div id="board-container"><div id="board"></div></div>

<!-- INVENTORY -->
<div id="inv-panel">
  <div id="inv-label">🎒<br>보관함</div>
  <div id="inv-slots"></div>
</div>

<!-- MODAL -->
<div id="modal" class="hidden" onclick="handleModalBg(event)">
  <div id="modal-content"><div id="modal-body"></div></div>
</div>

<button id="dev-btn" onclick="showDevMenu()" title="dev">⚙</button>
<div id="toast"></div>
<div id="drag-ghost" class="hidden"></div>

<script>
// 레벨별 테두리 색상: Lv1~6
const LV_COLORS=['#888888','#27ae60','#2980b9','#8e44ad','#e67e22','#f0c040'];

// ── IMAGE BACKGROUND REMOVAL ─────────────────
const _imgCache={};

function processImg(src, callback){
  if(_imgCache[src]&&_imgCache[src]!=='loading'){ callback(_imgCache[src]); return; }
  if(_imgCache[src]==='loading') return;
  _imgCache[src]='loading';
  const img=new Image();
  img.onload=function(){
    const SIZE=256;
    const c=document.createElement('canvas');
    c.width=SIZE; c.height=SIZE;
    const ctx=c.getContext('2d');
    ctx.drawImage(img,0,0,SIZE,SIZE);
    const id=ctx.getImageData(0,0,SIZE,SIZE);
    _removeBg(id);
    ctx.putImageData(id,0,0);
    _imgCache[src]=c.toDataURL();
    callback(_imgCache[src]);
  };
  img.onerror=function(){ _imgCache[src]=src; callback(src); };
  img.src=src;
}

function _removeBg(imageData){
  const d=imageData.data, w=imageData.width, h=imageData.height;
  const corners=[0,w-1,w*(h-1),w*h-1];
  // 코너 색상 수집
  const bgColors=corners.map(p=>({r:d[p*4],g:d[p*4+1],b:d[p*4+2]}));
  // 코너가 비회색이면(장면 이미지) 배경 제거 스킵
  const isGray=bgColors.every(c=>Math.max(Math.abs(c.r-c.g),Math.abs(c.g-c.b),Math.abs(c.r-c.b))<25);
  if(!isGray) return;
  // 체크보드: 4개 코너에 밝은/어두운 두 회색이 포함 → 모두 기준색으로 사용
  const thresh=38;
  const visited=new Uint8Array(w*h);
  const queue=new Int32Array(w*h);
  let head=0,tail=0;
  for(const p of corners){if(!visited[p]){visited[p]=1;queue[tail++]=p;}}
  while(head<tail){
    const p=queue[head++];
    const i=p*4;
    const r=d[i],g=d[i+1],b=d[i+2];
    // 4개 코너 색 중 하나라도 threshold 이내면 배경으로 판정
    const isBg=bgColors.some(c=>Math.abs(r-c.r)<=thresh&&Math.abs(g-c.g)<=thresh&&Math.abs(b-c.b)<=thresh);
    if(isBg){
      d[i+3]=0;
      const x=p%w,y=Math.floor(p/w);
      if(x>0&&!visited[p-1]){visited[p-1]=1;queue[tail++]=p-1;}
      if(x<w-1&&!visited[p+1]){visited[p+1]=1;queue[tail++]=p+1;}
      if(y>0&&!visited[p-w]){visited[p-w]=1;queue[tail++]=p-w;}
      if(y<h-1&&!visited[p+w]){visited[p+w]=1;queue[tail++]=p+w;}
    }
  }
}

function preloadAllImages(){
  const srcs=[];
  Object.values(CHAINS).forEach(ch=>{
    if(ch.genImg) srcs.push(ch.genImg);
    ch.items.forEach(it=>{ if(it.img) srcs.push(it.img); });
  });
  Object.values(SPECIALS).forEach(sp=>{ if(sp.img) srcs.push(sp.img); });
  // 상태바 아이콘
  const statImgs=['image/에너지_1.png','image/다이아몬드_1.png'];
  statImgs.forEach(s=>srcs.push(s));

  let i=0;
  function next(){
    if(i>=srcs.length) return;
    const src=srcs[i++];
    processImg(src,(result)=>{
      // 상태바 아이콘 즉시 DOM 업데이트
      if(src==='image/에너지_1.png'){
        const el=document.querySelector('#energy-wrap img.stat-ico');
        if(el) el.src=result;
      } else if(src==='image/다이아몬드_1.png'){
        const el=document.querySelector('#diamond-wrap img.stat-ico');
        if(el) el.src=result;
      }
      renderBoard(); renderInventory();
      setTimeout(next,0);
    });
  }
  setTimeout(next,0);
}

function migrate(p){
  if(p.quest!==undefined){ delete p.quest; p.quests=[]; }
  if(!Array.isArray(p.quests)||p.quests.length<3||(p.quests[0]&&p.quests[0].xpReward===undefined)){
    p.quests=[];
  }
  G=Object.assign(G,p);
  if(G.energy===undefined) G.energy=G.maxEnergy||120;
  if(!G.maxEnergy) G.maxEnergy=120;
  if(G.diamonds===undefined) G.diamonds=0;
  if(!G.level) G.level=1;
  if(!G.xp) G.xp=0;
  if(!G.lastEnergyTime) G.lastEnergyTime=Date.now();
  if(!G.questBatchCount) G.questBatchCount=0;
  if(!G.inventory) G.inventory=[];
  if(!G.invSlots||G.invSlots<3) G.invSlots=3;
  if(G.muted===undefined) G.muted=false;
  if(!G.daily||typeof G.daily!=='object') G.daily={date:'',missions:[],streak:0,claimedToday:false,mergeCount:0,questCount:0,restoreCount:0};
  if(G.daily.mergeCount===undefined) G.daily.mergeCount=0;
  if(G.daily.questCount===undefined) G.daily.questCount=0;
  if(G.daily.restoreCount===undefined) G.daily.restoreCount=0;
  // BUG-4: _uid 복원
  var allItems=G.board.concat(G.inventory);
  var maxUid=allItems.reduce(function(m,it){ return (it&&typeof it.uid==='number'&&it.uid>m)?it.uid:m; },0);
  _uid=maxUid+1;
}

function load(){
  try{
    const d=localStorage.getItem('eco_v2');
    if(!d) return false;
    const p=JSON.parse(d);
    migrate(p);
    return true;
  }catch(e){ return false; }
}


// ── ENERGY ──────────────────────────────────
function regenEnergy(){
  if(G.energy>=G.maxEnergy){ G.lastEnergyTime=Date.now(); return; }
  const elapsed=Date.now()-G.lastEnergyTime;
  const ms=getRegenMs();
  const gained=Math.floor(elapsed/ms);
  if(gained>0){ G.energy=Math.min(G.maxEnergy,G.energy+gained); G.lastEnergyTime+=gained*ms; save(); }
}
function updateEnergyUI(){
  regenEnergy();
  const el=document.getElementById('energy-text');
  if(G.energy>=G.maxEnergy){ el.textContent=G.energy+'/'+G.maxEnergy; return; }
  const rem=getRegenMs()-((Date.now()-G.lastEnergyTime)%getRegenMs());
  const m=Math.floor(rem/60000), s=Math.floor((rem%60000)/1000);
  el.textContent=G.energy+'/'+G.maxEnergy+' '+m+':'+String(s).padStart(2,'0');
}
function addEnergy(n){ G.energy=Math.min(G.maxEnergy,G.energy+n); save(); updateEnergyUI(); }
function spendEnergy(n){
  if(G.energy<n){ toast('에너지가 부족해요! ⚡'); playSfx('error'); return false; }
  G.energy-=n; save(); updateEnergyUI(); return true;
}
function showEnergyModal(){
  updateEnergyUI();
  const full=G.energy>=G.maxEnergy, need=G.maxEnergy-G.energy;
  showModal(`<div style="text-align:center">

    ${!full&&need>0&&G.diamonds>=30?`<button class="mbtn diamond" onclick="buyEnergy(30,${need})">💎 30 → ⚡ 전량(+${need}) 충전</button>`:''}
    <button class="mbtn cancel" onclick="hideModal();showShop()">🛒 상점 가기</button>

}

function updateLevelUI(){
  document.getElementById('level-text').textContent='Lv.'+G.level;
  document.getElementById('xp-bar').style.width=(Math.min(1,G.xp/xpNeeded(G.level))*100)+'%';
}
function addXP(pts){
  if(G.level>=100) return;
  G.xp+=pts;
  while(G.level<100){
    const need=xpNeeded(G.level);
    if(G.xp>=need){ G.xp-=need; G.level++; applyLevelBonus(G.level); }
    else break;
  }
  if(G.level>=100) G.xp=0;
  save(); updateLevelUI();
}
function applyLevelBonus(lv){
  const b=LEVEL_BONUSES[lv]; if(!b) return;
  if(b.maxEnergy){ G.maxEnergy+=b.maxEnergy; addEnergy(b.maxEnergy); }
  if(b.diamonds) addDiamonds(b.diamonds);
  if(b.specialItem) spawnSpecialItem(b.specialItem);
  vibrate([30,15,30]);
  playSfx('levelup');
  saveNow();
  showModal(`<div class="celebration">
    <span class="cel-emoji">⬆️</span>
    <h2>레벨 업! Lv.${lv}</h2>

  </div>`);

// ── QUESTS ──────────────────────────────────
function generateQuestBatch(){
  // DESIGN-2: 보드에 서식지가 있는 종만 후보
  const hasGen=c=>G.board.some(b=>b&&b.isGenerator&&b.chain===c);
  let sp=G.unlocked.filter(c=>!['equipment','researcher'].includes(c)&&hasGen(c));
  if(!sp.length) sp=G.unlocked.filter(c=>!['equipment','researcher'].includes(c));
  if(!sp.length){ renderQuests(); return; }
  G.quests=[];
  for(let i=0;i<3;i++){
    const chain=sp[Math.floor(Math.random()*sp.length)];
    const maxLv=Math.min(Math.floor(G.score/80)+2,5);
    const level=Math.max(1,Math.min(maxLv,1+Math.floor(Math.random()*maxLv)));
    const count=level<=2?2:1;
    G.quests.push({
      chain,level,count,
      scoreReward:level*20*count,
      xpReward:level*30+count*10,
      npc:NPCS[Math.floor(Math.random()*NPCS.length)],
      done:false
    });
  }
  save(); renderQuests();
}

function renderQuests(){
  const panel=document.getElementById('quest-panel');
  const sp=G.unlocked.filter(c=>!['equipment','researcher'].includes(c));
  if(!sp.length||!G.quests.length){
    panel.innerHTML='<div id="quest-empty">🌱 서식지를 만들면 퀘스트가 시작됩니다!</div>';
    return;
  }
  let html='';
  G.quests.forEach((q,i)=>{
    const ch=CHAINS[q.chain], it=ch.items[q.level-1];
    const found=q.done?q.count:G.board.filter(c=>c&&!c.isGenerator&&!c.isSpecial&&c.chain===q.chain&&c.level===q.level).length;
    const ready=!q.done&&found>=q.count;
    html+=`<div class="qcard${q.done?' qdone':ready?' qready':''}">
      <div class="qh"><span class="qnpc">${q.npc.emoji}</span><span class="qname">${q.npc.name}</span></div>
      <div class="qreq">${it.img?'<img src="'+it.img+'" style="width:16px;height:16px;vertical-align:middle;object-fit:contain">':it.emoji} Lv${q.level}×${q.count}${q.done?' ✅':' ('+Math.min(found,q.count)+'/'+q.count+')'}</div>
      <div class="qrew">+${q.scoreReward}점 +${q.xpReward}XP</div>
      <button class="qbtn${ready?' ready':''}" onclick="fulfillQuest(${i})" ${q.done||!ready?'disabled':''}>${q.done?'완료':'제출'}</button>
    </div>`;
  });
  panel.innerHTML=html;
}

function fulfillQuest(idx){
  const q=G.quests[idx]; if(!q||q.done) return;
  const found=G.board.filter(c=>c&&!c.isGenerator&&!c.isSpecial&&c.chain===q.chain&&c.level===q.level).length;
  if(found<q.count){ toast('아이템이 부족해요!'); return; }
  let rm=0;
  for(let i=0;i<G.board.length&&rm<q.count;i++){
    const c=G.board[i];
    if(c&&!c.isGenerator&&!c.isSpecial&&c.chain===q.chain&&c.level===q.level){ G.board[i]=null; rm++; }
  }
  q.done=true;
  addScore(q.scoreReward); addXP(q.xpReward);
  updateDailyProgress('quest',++G.daily.questCount);
  toast('퀘스트 완료! +'+q.scoreReward+'점 🌿');
  if(G.quests.every(q=>q.done)){
    G.questBatchCount=(G.questBatchCount||0)+1;
    if(G.questBatchCount%3===0) spawnSpecialItem();
    if(G.questBatchCount%3===0){ addDiamonds(1); toast('💎 +1 배치 보너스!'); }
    setTimeout(generateQuestBatch,1000);
  }
  save(); renderBoard(); renderQuests();
}

// ── SCORE & CHAPTER ─────────────────────────
function addScore(pts){ G.score+=pts; updateScoreUI(); checkChapterAdvance(); save(); }
function updateScoreUI(){
  const ch=getCD(G.chapter);
  const prev=G.chapter>1?getCD(G.chapter-1).scoreGoal:0;
  const goal=G.chapter>=CHAPTER_DATA.length?Infinity:ch.scoreGoal;
  const prog=goal===Infinity?1:Math.min(1,(G.score-prev)/(ch.scoreGoal-prev));
  document.getElementById('score-text').textContent=G.score+'점';
  document.getElementById('score-bar').style.width=(prog*100)+'%';
  document.getElementById('score-goal-text').textContent=goal===Infinity?'최고 챕터':'목표 '+ch.scoreGoal+'점';
}
function checkChapterAdvance(){
  // BUG-1: 마지막 챕터 상한 가드
  if(G.chapter>=CHAPTER_DATA.length) return;
  // BUG-2: while 루프로 여러 챕터 동시 승급 처리
  while(G.chapter<CHAPTER_DATA.length){
    const ch=getCD(G.chapter);
    if(G.score<ch.scoreGoal) break;
    G.chapter++;
    const nc=getCD(G.chapter);
    if(nc&&nc.unlocks) nc.unlocks.forEach(c=>{ if(!G.unlocked.includes(c)) G.unlocked.push(c); });
    document.getElementById('chapter-label').textContent='챕터 '+G.chapter;
    G.diamonds+=3; updateDiamondUI();
    playSfx('levelup');
    if(nc&&nc.unlocks&&nc.unlocks.length){
      toast('📖 챕터 '+G.chapter+'! 🔓 '+nc.unlocks.map(c=>CHAINS[c].name).join(', ')+' 해금! 💎+3');
      setTimeout(generateQuestBatch,600);
    } else {
      toast('📖 챕터 '+G.chapter+' — '+nc.title+'! 💎+3');
    }
  }
  saveNow(); updateScoreUI();
}

// ── BOARD LOGIC ─────────────────────────────
function nearestEmpty(fromIdx){
  let best=-1,bd=Infinity;
  const fc=fromIdx%COLS,fr=Math.floor(fromIdx/COLS);
  for(let i=0;i<G.board.length;i++){
    if(G.board[i]===null){
      const d=Math.abs(i%COLS-fc)+Math.abs(Math.floor(i/COLS)-fr);
      if(d<bd){bd=d;best=i;}
    }
  }
  return best;
}
function tapGenerator(idx){
  var gen=G.board[idx]; if(!gen||!gen.isGenerator) return;
  if(gen.charges===undefined) gen.charges=3;
  if(gen.charges<=0){ toast('충전 중이에요! ⏳ 잠시 후 다시 시도해주세요.'); playSfx('error'); return; }
  if(!spendEnergy(1)) return;
  gen.charges--;
  playSfx('tap');
  var e=nearestEmpty(idx);
  if(e===-1){
    // 보드 가득 → 인벤토리로
    if(!addToInventory(mkItem(gen.chain,1))){ addEnergy(1); gen.charges++; return; }
    addScore(1); updateCell(idx); save(); return;
  }
  G.board[e]=mkItem(gen.chain,1);
  save(); updateCell(idx); updateCell(e); addScore(1); renderQuests();
}
function rechargeGenerators(){
  let changed=false;
  G.board.forEach(item=>{
    if(!item||!item.isGenerator) return;
    if(item.charges===undefined){ item.charges=3; item.maxCharges=3; item.lastRechargeTime=Date.now(); changed=true; return; }
    if(item.charges>=(item.maxCharges||3)){ item.lastRechargeTime=Date.now(); return; }
    const ms=300000;
    const elapsed=Date.now()-(item.lastRechargeTime||Date.now());
    const gained=Math.floor(elapsed/ms);
    if(gained>0){
      item.charges=Math.min(item.maxCharges||3,item.charges+gained);
      item.lastRechargeTime=(item.lastRechargeTime||Date.now())+gained*ms;
      changed=true;
    }
  });
  if(changed){ saveNow(); renderBoard(); }
}
function tapSpecial(idx){
  const item=G.board[idx]; if(!item||!item.isSpecial) return;
  if(item.type==='energy_pack'){
    G.board[idx]=null; addEnergy(30); save(); updateCell(idx); toast('⚡ +30 에너지!'); playSfx('tap');
  } else if(item.type==='diamond_shard'){
    G.board[idx]=null; G.diamonds+=1; save(); updateCell(idx); updateDiamondUI(); toast('💎 +1 다이아!'); playSfx('tap');
  } else if(item.type==='alt_habitat'){
    if(!spendEnergy(1)) return;
    const e=nearestEmpty(idx);
    if(e===-1){ addEnergy(1); toast('보드가 가득 찼어요!'); return; }
    const sp=G.unlocked.filter(c=>!['equipment','researcher'].includes(c));
    const chain=sp.length?sp[Math.floor(Math.random()*sp.length)]:'amphibian';
    const lv=Math.ceil(Math.random()*3);
    G.board[e]=mkItem(chain,lv);
    save(); updateCell(idx); updateCell(e); addScore(1); renderQuests(); playSfx('tap');
    toast('🌊 '+CHAINS[chain].name+' Lv'+lv+' 생산!');
  }
}
function spawnSpecialItem(type){
  const types=['energy_pack','diamond_shard','alt_habitat'];
  const t=type||types[Math.floor(Math.random()*types.length)];
  const e=nearestEmpty(0);
  if(e===-1){ toast('보드가 가득 차 보너스 아이템을 못 받았어요!'); return; }
  G.board[e]=mkSpecial(t); save(); updateCell(e);
  toast('🎁 '+SPECIALS[t].name+' 획득!');
}
function handleDrop(fromIdx,toIdx){
  if(fromIdx===toIdx) return;
  const from=G.board[fromIdx],to=G.board[toIdx];
  if(!from) return;
  if(from.isGenerator||from.isSpecial){
    if(!to){ G.board[toIdx]=from; G.board[fromIdx]=null; }
    else{ G.board[toIdx]=from; G.board[fromIdx]=to; }
    save(); updateCell(fromIdx); updateCell(toIdx); return;
  }
  if(!to){ G.board[toIdx]=from; G.board[fromIdx]=null; save(); updateCell(fromIdx); updateCell(toIdx); return; }
  if(to.isGenerator||to.isSpecial){ G.board[toIdx]=from; G.board[fromIdx]=to; save(); updateCell(fromIdx); updateCell(toIdx); return; }
  if(from.chain===to.chain&&from.level===to.level){
    const next=from.level+1,ch=CHAINS[from.chain];
    if(ch&&next<=ch.items.length){
      G.board[toIdx]=mkItem(from.chain,next); G.board[fromIdx]=null;
      save(); updateCell(fromIdx); updateCell(toIdx);
      // UX-3: 합성 애니메이션
      const mc=_cells[toIdx];
      if(mc){ mc.classList.add('cell-pop'); setTimeout(()=>mc.classList.remove('cell-pop'),300); }
      // UX-1: 햅틱
      vibrate([20]);
      playSfx('merge');
      // 일일 미션 합성 카운트
      if(G.daily.missions&&G.daily.missions.length){ G.daily.mergeCount++; updateDailyProgress('merge',G.daily.mergeCount); }
      if(ch.items[next-1].rare) onRare(from.chain,next);
      addScore(5*next); renderQuests();
    } else { toast('이미 최고 등급이에요!'); save(); }
    return;
  }
  const isEq=c=>c.chain==='equipment'&&c.level===6;
  const isRe=c=>c.chain==='researcher'&&c.level===6;
  if((isEq(from)&&isRe(to))||(isRe(from)&&isEq(to))){ showSpeciesGenSelect(fromIdx,toIdx); return; }
  G.board[toIdx]=from; G.board[fromIdx]=to; save(); updateCell(fromIdx); updateCell(toIdx);
}
function showSpeciesGenSelect(fi,ti){

// ── INVENTORY ───────────────────────────────
var INV_MAX=10;
const INV_UNLOCK_COST=2; // 슬롯 1칸 해금 비용 (💎)

function renderInventory(){

  G.inventory.forEach(function(item,i){

      +'<div class="lv-badge" style="color:'+lvColor+';border-color:'+lvColor+'">'+item.level+'</div>';
    cell.addEventListener('click',function(){ moveInvToBoard(i); });
    slots.appendChild(cell);
  });
  // 빈 슬롯 (해금된 슬롯 중 아이템 없는 칸)
  var emptyUnlocked=Math.max(0,G.invSlots-G.inventory.length);
  for(var i=0;i<emptyUnlocked;i++){
    var cell=document.createElement('div');
    cell.className='inv-cell inv-cell-empty';
    slots.appendChild(cell);
  }
  // 잠금 슬롯
  var locked=INV_MAX-G.invSlots;
  for(var i=0;i<locked;i++){
    var cell=document.createElement('div');
    cell.className='inv-cell inv-cell-locked';
    cell.innerHTML='<span class="inv-lock-ico">🔒</span><span class="inv-lock-cost">'+INV_UNLOCK_COST+'💎</span>';
    cell.addEventListener('click',unlockInvSlot);
    slots.appendChild(cell);
  }
}
function unlockInvSlot(){
  if(G.invSlots>=INV_MAX){ toast('이미 보관함이 최대예요!'); return; }
  if(G.diamonds<INV_UNLOCK_COST){ toast('💎 다이아가 부족해요! ('+INV_UNLOCK_COST+'💎 필요)'); return; }
  G.diamonds-=INV_UNLOCK_COST;
  G.invSlots++;
  save(); updateDiamondUI(); renderInventory();
  toast('보관함 슬롯 해금! ('+G.invSlots+'/'+INV_MAX+') 🎒');
}
function addToInventory(item){
  if(G.inventory.length>=G.invSlots){ toast('보관함이 가득 찼어요! 🔒 슬롯 해금이 필요해요.'); return false; }
  G.inventory.push(item);
  save(); renderInventory();
  toast('보관함에 저장됐어요 🎒 (탭해서 꺼내기)');
  return true;
}
function moveInvToBoard(invIdx){
  var item=G.inventory[invIdx]; if(!item) return;
  var e=nearestEmpty(0);
  if(e===-1){ toast('보드에 빈 칸이 없어요!'); return; }
  G.board[e]=item;
  G.inventory.splice(invIdx,1);
  save(); updateCell(e); renderInventory(); renderQuests();
  toast('보드로 꺼냈어요!');
}

// ── HAPTIC ───────────────────────────────────
function vibrate(p){ try{ navigator.vibrate&&navigator.vibrate(p); }catch(e){} }

// ── DRAG ────────────────────────────────────
var drag={active:false,fromIdx:null,startX:0,startY:0,moved:false,isTouch:false,pressTime:0,pressIdx:-1};
var _holdEl=null;

function initDrag(){
  const b=document.getElementById('board');
  b.addEventListener('touchstart',onTS,{passive:false});
  b.addEventListener('touchmove',onTM,{passive:false});
  b.addEventListener('touchend',onTE);
  b.addEventListener('touchcancel',onTC); // BUG-3
  b.addEventListener('mousedown',onMS);
  document.addEventListener('mousemove',onMM);
  document.addEventListener('mouseup',onME);
}
function clearHold(){
  if(_holdEl){ _holdEl.classList.remove('cell-holding'); _holdEl=null; }
}
function onTS(e){
  var cell=e.target.closest('.cell'); if(!cell) return;
  var idx=+cell.dataset.idx,item=G.board[idx],t=e.touches[0];
  drag.startX=t.clientX; drag.startY=t.clientY;
  drag.fromIdx=idx; drag.moved=false; drag.active=false; drag.isTouch=true;
  drag.pressTime=Date.now(); drag.pressIdx=idx;
  if(item) e.preventDefault();
  // 시각 피드백: 일반 아이템만
  clearHold();
  if(item&&!item.isGenerator&&!item.isSpecial){
    _holdEl=cell; cell.classList.add('cell-holding');
  }
}
function onTM(e){
  clearHold();
  if(drag.fromIdx===null) return;
  var item=G.board[drag.fromIdx]; if(!item) return;
  e.preventDefault();
  var t=e.touches[0];
  var dx=t.clientX-drag.startX,dy=t.clientY-drag.startY;
  if(!drag.active&&Math.hypot(dx,dy)>7){ drag.active=true; drag.moved=true; startGhost(drag.fromIdx,t.clientX,t.clientY); }
  if(drag.active) moveGhost(t.clientX,t.clientY);
}
function onTE(e){
  clearHold();
  var t=e.changedTouches[0];
  var held=Date.now()-drag.pressTime;
  if(drag.active){
    endDrag(t.clientX,t.clientY);
  } else if(!drag.moved&&drag.fromIdx!==null){
    var item=G.board[drag.fromIdx];
    // 길게 누르기: 400ms 이상 → 방생 모달 (setTimeout 없이 시간 측정)
    if(held>=400&&item&&!item.isGenerator&&!item.isSpecial){
      var delIdx=drag.fromIdx;
      drag.active=false; drag.fromIdx=null; drag.moved=false;
      setTimeout(function(){ drag.isTouch=false; },500);
      vibrate([30]);
      showDeleteModal(delIdx);
      return;
    }
    if(item&&item.isGenerator) tapGenerator(drag.fromIdx);
    else if(item&&item.isSpecial) tapSpecial(drag.fromIdx);
  }
  drag.active=false; drag.fromIdx=null; drag.moved=false;
  setTimeout(function(){ drag.isTouch=false; },500);
}
// touchcancel: 드래그 상태만 초기화, 길게 누르기는 onTE에서 처리
function onTC(){
  clearHold();
  document.getElementById('drag-ghost').classList.add('hidden');
  var src=document.querySelector('.cell-dragging');
  if(src) src.classList.remove('cell-dragging');
  drag.active=false; drag.fromIdx=null; drag.moved=false;
}

// DESIGN-1: 방생(삭제) 기능
function showDeleteModal(idx){
  const item=G.board[idx]; if(!item||item.isGenerator) return;
  drag.fromIdx=null; drag.active=false; drag.moved=false;
  var ch=item.isSpecial?null:CHAINS[item.chain];
  var itData=item.isSpecial?SPECIALS[item.type]:(ch&&ch.items?ch.items[item.level-1]:null);
  var itImg=itData&&itData.img?itData.img:null;
  var emoji=itData?itData.emoji:'?';
  var name=itData?itData.name:'아이템';
  var iconHtml=itImg?'<img src="'+itImg+'" style="width:44px;height:44px;object-fit:contain">':emoji;
  showModal('<div style="text-align:center">'
    +'<div style="font-size:44px;margin:10px 0">'+iconHtml+'</div>'
    +'<h3>🌿 자연으로 방생</h3>'
    +'<p>'+name+'을(를) 보드에서 제거할까요?</p>'
    +'<p style="font-size:11px;color:var(--dim)">삭제 시 에너지 1 환급</p>'
    +'<button class="mbtn" onclick="deleteItem('+idx+')">방생 (+1⚡)</button>'
    +'<button class="mbtn cancel" onclick="hideModal()">취소</button>'
    +'</div>');
}
function deleteItem(idx){
  const item=G.board[idx]; if(!item||item.isGenerator) return;
  G.board[idx]=null; addEnergy(1);
  hideModal(); save(); updateCell(idx); renderQuests();
  vibrate([15]); toast('🌿 방생했습니다 (+1⚡)');
}
function onMS(e){
  if(drag.isTouch) return;
  const cell=e.target.closest('.cell'); if(!cell) return;
  drag.startX=e.clientX; drag.startY=e.clientY;
  drag.fromIdx=+cell.dataset.idx; drag.moved=false; drag.active=false;
}
function onMM(e){
  if(drag.isTouch||drag.fromIdx===null) return;
  const item=G.board[drag.fromIdx]; if(!item) return;
  const dx=e.clientX-drag.startX,dy=e.clientY-drag.startY;
  if(!drag.active&&Math.hypot(dx,dy)>7){ drag.active=true; drag.moved=true; startGhost(drag.fromIdx,e.clientX,e.clientY); }
  if(drag.active) moveGhost(e.clientX,e.clientY);
}
function onME(e){
  if(drag.isTouch) return;
  if(drag.active){ endDrag(e.clientX,e.clientY); }
  else if(!drag.moved&&drag.fromIdx!==null){
    const item=G.board[drag.fromIdx];
    if(item&&item.isGenerator) tapGenerator(drag.fromIdx);
    else if(item&&item.isSpecial) tapSpecial(drag.fromIdx);
  }
  drag.active=false; drag.fromIdx=null; drag.moved=false;
}
function startGhost(fromIdx,cx,cy){
  const src=document.querySelector('.cell[data-idx="'+fromIdx+'"]'); if(!src) return;
  src.classList.add('cell-dragging');
  const g=document.getElementById('drag-ghost');
  g.innerHTML=src.innerHTML; g.style.cssText=src.style.cssText;
  const w=src.offsetWidth;
  g.style.width=w+'px'; g.style.height=w+'px';
  g.style.left=(cx-w/2)+'px'; g.style.top=(cy-w/2)+'px';
  g.style.position='fixed'; g.style.pointerEvents='none';
  g.style.zIndex='999'; g.style.opacity='0.88'; g.style.transform='scale(1.15)';
  g.classList.remove('hidden');
}
function moveGhost(cx,cy){
  const g=document.getElementById('drag-ghost');
  const w=parseFloat(g.style.width)||50;
  g.style.left=(cx-w/2)+'px'; g.style.top=(cy-w/2)+'px';
}
function endDrag(cx,cy){
  const g=document.getElementById('drag-ghost'); g.classList.add('hidden');
  const src=document.querySelector('.cell[data-idx="'+drag.fromIdx+'"]');
  if(src) src.classList.remove('cell-dragging');
  g.style.display='none';
  const el=document.elementFromPoint(cx,cy);
  g.style.display=''; g.classList.add('hidden');
  const tc=el&&el.closest('.cell');
  if(tc&&tc.dataset.idx!==undefined) handleDrop(drag.fromIdx,+tc.dataset.idx);
}

// ── RENDER ──────────────────────────────────
function initBoard(){
  const b=document.getElementById('board');
  b.innerHTML='';
  for(let i=0;i<CELLS;i++){
    const cell=document.createElement('div');
    cell.className='cell';
    cell.dataset.idx=i;
    b.appendChild(cell);
    _cells[i]=cell;
  }
}

function updateCell(idx){
  const cell=_cells[idx];
  if(!cell) return;
  const item=G.board[idx];
  cell.className='cell';
  cell.style.cssText='';
  cell.innerHTML='';
  if(!item){ cell.classList.add('cell-empty'); return; }

  if(item.isSpecial){
    const sp=SPECIALS[item.type];
    cell.classList.add('cell-filled','cell-special');
    if(item.type==='alt_habitat') cell.classList.add('cell-gen');
    cell.style.cssText='background:'+sp.bg+';border-color:'+sp.color+';color:'+sp.color;
    cell.innerHTML='<div class="item-emoji">'+spHtml(sp,'')+'</div>'
      +'<div class="gen-lbl" style="color:'+sp.color+'">'+(item.type==='alt_habitat'?'서식지':'특수')+'</div>';
  } else {
    const ch=CHAINS[item.chain]; if(!ch) return;
    const it=item.isGenerator?ch.items[0]:ch.items[item.level-1];
    cell.classList.add('cell-filled');
    if(item.isGenerator){
      cell.classList.add('cell-gen');
      cell.style.cssText='background:'+ch.bg+';border-color:'+ch.color+';color:'+ch.color;
      if(item.charges===undefined) item.charges=item.maxCharges||3;
      const dots='•'.repeat(item.charges)+'◦'.repeat((item.maxCharges||3)-item.charges);
      const genIcon=ch.genImg?'<img src="'+((_imgCache[ch.genImg]&&_imgCache[ch.genImg]!=='loading')?_imgCache[ch.genImg]:ch.genImg)+'" alt="'+ch.name+'">':(it?it.emoji:'?');
      cell.innerHTML='<div class="item-emoji">'+genIcon+'</div>'
        +'<div class="charge-dots">'+dots+'</div>'
        +'<div class="gen-lbl" style="color:'+ch.color+'">'+(ch.isBase?'생산소':'서식지')+'</div>';
    } else {
      const lvColor=LV_COLORS[item.level-1]||ch.color;
      if(it&&it.rare) cell.classList.add('cell-rare');
      if(_qSet.has(item.chain+'_'+item.level)) cell.classList.add('cell-quest-match');
      cell.style.cssText='background:'+ch.bg+';border-color:'+lvColor+';color:'+ch.color;
      cell.innerHTML='<div class="item-emoji">'+itmHtml(it,'')+'</div>'
        +'<div class="lv-badge" style="color:'+lvColor+';border-color:'+lvColor+'">'+item.level+'</div>';
    }
  }
}

function renderBoard(){
  _qSet=new Set();
  if(G.quests) G.quests.forEach(q=>{ if(!q.done) _qSet.add(q.chain+'_'+q.level); });
  for(let i=0;i<CELLS;i++) updateCell(i);
}

// ── MODAL & TOAST ────────────────────────────
function showModal(html){ document.getElementById('modal-body').innerHTML=html; document.getElementById('modal').classList.remove('hidden'); }
function hideModal(){ document.getElementById('modal').classList.add('hidden'); }
function handleModalBg(e){ if(e.target.id==='modal') hideModal(); }
let _tt;
function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.className='toast show'; clearTimeout(_tt); _tt=setTimeout(()=>el.className='toast',2600); }

// ── DEX ─────────────────────────────────────
function showDex(){
  if(!G.conserved.length){
    showModal('<h3>📋 복원 도감</h3><p>아직 복원된 종이 없어요.</p><p>장비 Lv6 + 연구원 Lv6을 합성해 서식지를 만들고 Lv6까지 합성해보세요!</p><button class="mbtn" onclick="hideModal()">닫기</button>');
    return;
  }
  const gr={};
  G.conserved.forEach(e=>{ (gr[e.chain]=gr[e.chain]||[]).push(e); });
  let html='<h3>📋 복원 도감</h3><div class="dex-items">';
  Object.entries(gr).forEach(([cid,list])=>{
    const ch=CHAINS[cid];
    html+='<div class="dex-group"><div class="dex-group-title" style="color:'+ch.color+'">'+ch.name+' ('+list.length+')</div>';
    list.forEach(e=>{
      const icon=e.img?'<img src="'+e.img+'" style="width:18px;height:18px;vertical-align:middle;object-fit:contain">':e.emoji;
      html+='<div class="dex-entry" style="cursor:pointer" onclick="showRareCard(\''+e.chain+'\')"><span>'+icon+' '+e.name+'</span><span class="dex-date">'+e.date+' ›</span></div>';
    });
    html+='</div>';
  });
  html+='</div><div class="dex-total">총 '+G.conserved.length+'종 복원 🌿</div><button class="mbtn" onclick="hideModal()">닫기</button>';
  showModal(html);
}

// ── SOUND ────────────────────────────────────
let _audioCtx=null;
function resumeAudio(){ if(_audioCtx&&_audioCtx.state==='suspended') _audioCtx.resume(); }
function playSfx(type){
  if(G.muted) return;
  try{
    if(!_audioCtx) _audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    const ctx=_audioCtx;
    const freqs={merge:[440,880],tap:[523],rare:[523,659,784],levelup:[261,392,523],error:[150]};
    const notes=freqs[type]||[440];
    notes.forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value=f;
      o.type=type==='error'?'sawtooth':'sine';
      const t=ctx.currentTime+i*0.12;
      g.gain.setValueAtTime(0.18,t);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.15);
      o.start(t); o.stop(t+0.15);
    });
  }catch(e){}
}
function toggleMute(){
  G.muted=!G.muted;
  document.getElementById('sound-btn').textContent=G.muted?'🔇':'🔊';
  save();
}

// ── DAILY MISSIONS ────────────────────────────
function generateDailyMissions(){
  return [
    {type:'merge',label:'합성하기',target:15,current:0,reward:{diamonds:1},done:false,claimed:false},
    {type:'quest',label:'퀘스트 완료',target:2,current:0,reward:{energy:30},done:false,claimed:false},
    {type:'restore',label:'종 복원',target:1,current:0,reward:{diamonds:3},done:false,claimed:false},
  ];
}
function checkDailyReset(){
  const today=new Date().toISOString().slice(0,10);
  if(G.daily.date===today) return;
  // 연속 출석 계산
  const yesterday=new Date(Date.now()-86400000).toISOString().slice(0,10);
  if(G.daily.date===yesterday) G.daily.streak=(G.daily.streak||0)+1;
  else G.daily.streak=1;
  G.daily.date=today;
  G.daily.missions=generateDailyMissions();
  G.daily.claimedToday=false;
  G.daily.mergeCount=0;
  G.daily.questCount=0;
  G.daily.restoreCount=0;
  save();
}
function updateDailyProgress(type,count){
  if(!G.daily.missions||!G.daily.missions.length) return;
  const m=G.daily.missions.find(m=>m.type===type);
  if(!m||m.done) return;
  m.current=count;
  if(m.current>=m.target) m.done=true;
  save();
}
function claimAttendance(){
  if(G.daily.claimedToday){ toast('오늘 출석은 이미 했어요'); return; }
  const s=G.daily.streak||1;
  if(s%30===0){ addDiamonds(20); addEnergy(100); toast('🎉 30일 연속! 💎+20 ⚡+100'); }
  else if(s%7===0){ addDiamonds(5); addEnergy(50); toast('🎉 7일 연속! 💎+5 ⚡+50'); }
  else{ addEnergy(30); toast('✅ 출석 완료! ⚡+30'); }
  G.daily.claimedToday=true;
  save();
  showDailyModal();
}
function claimMission(idx){
  const m=G.daily.missions[idx];
  if(!m||!m.done||m.claimed) return;
  if(m.reward.diamonds){ G.diamonds+=m.reward.diamonds; updateDiamondUI(); toast('💎 +'+m.reward.diamonds+' 미션 보상!'); }
  if(m.reward.energy){ addEnergy(m.reward.energy); toast('⚡ +'+m.reward.energy+' 미션 보상!'); }
  m.claimed=true;
  save();
  showDailyModal();
}
function showDailyModal(){
  checkDailyReset();
  const s=G.daily.streak||0;
  const attended=G.daily.claimedToday;
  let missionsHtml='';
  (G.daily.missions||[]).forEach((m,i)=>{
    const pct=Math.min(100,Math.round((m.current/m.target)*100));
    const rewLabel=m.reward.diamonds?'💎'+m.reward.diamonds:m.reward.energy?'⚡'+m.reward.energy:'';
    let btnHtml='';
    if(m.claimed) btnHtml='<button class="daily-claim-btn" disabled>완료✅</button>';
    else if(m.done) btnHtml='<button class="daily-claim-btn" onclick="claimMission('+i+')">수령</button>';
    else btnHtml='<button class="daily-claim-btn" disabled>'+m.current+'/'+m.target+'</button>';
    missionsHtml+=`<div class="daily-mission-row">
      <div class="daily-mission-label">${m.label} <span style="font-size:10px;color:var(--dim)">(${rewLabel})</span></div>
      <div class="daily-progress-bar-bg"><div class="daily-progress-bar" style="width:${pct}%"></div></div>
      ${btnHtml}
    </div>`;
  });
  showModal(`<h3>🗓️ 일일 미션</h3>
    <p style="color:#f0c040;font-size:13px;margin:4px 0">${s}일 연속 접속 🔥</p>
    <button class="mbtn${attended?' cancel':''}" onclick="${attended?'':'claimAttendance()'}" ${attended?'disabled':''}>
      ${attended?'출석 완료 ✅':'출석 보상 받기'}
    </button>
    <div style="margin-top:10px">${missionsHtml}</div>
    <button class="mbtn cancel" style="margin-top:12px" onclick="hideModal()">닫기</button>`);
}

// ── INIT ────────────────────────────────────
function init(){
  const loaded=load();
  if(!loaded){
    G.board[0]=mkGen('equipment');
    G.board[6]=mkGen('researcher');
    G.board[1]=mkItem('equipment',1);
    G.board[7]=mkItem('researcher',1);
    saveNow();
  }
  checkDailyReset();
  initBoard();
  renderBoard(); renderInventory(); updateScoreUI(); updateEnergyUI(); updateDiamondUI(); updateLevelUI();
  document.getElementById('chapter-label').textContent='챕터 '+G.chapter;
  document.getElementById('sound-btn').textContent=G.muted?'🔇':'🔊';
  const sp=G.unlocked.filter(c=>!['equipment','researcher'].includes(c));
  if(sp.length&&(G.quests.length===0||G.quests.every(q=>q.done))){
    setTimeout(generateQuestBatch,500);
  } else { renderQuests(); }
  setInterval(updateEnergyUI, 1000);
  setInterval(()=>{ regenEnergy(); updateEnergyUI(); }, 30000);
  setInterval(rechargeGenerators, 60000);
  initDrag();
  preloadAllImages();
  document.addEventListener('touchstart', resumeAudio, {once:true});
  document.addEventListener('click', resumeAudio, {once:true});
  document.addEventListener('visibilitychange',()=>{ if(document.hidden) saveNow(); });
}
document.addEventListener('DOMContentLoaded',init);
